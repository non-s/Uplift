<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Pagina nao encontrada - Uplift</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7fbff;
      --panel: #ffffff;
      --text: #102033;
      --muted: #526173;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(100%, 560px);
      border: 1px solid #d7e2f0;
      border-radius: 8px;
      background: var(--panel);
      padding: 32px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
    }
    p { color: var(--muted); line-height: 1.6; }
    .code { color: var(--accent); font: 700 0.9rem ui-monospace, SFMono-Regular, Consolas, monospace; }
    h1 { margin: 10px 0 12px; font-size: clamp(2rem, 6vw, 3rem); }
    a {
      display: inline-flex;
      margin-top: 16px;
      color: #ffffff;
      background: var(--accent);
      border-radius: 6px;
      padding: 12px 16px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="code">404 / Uplift</div>
    <h1>Pagina nao encontrada</h1>
    <p>Esse endereco nao esta disponivel. Volte ao Uplift para continuar sua navegacao.</p>
    <a href="/Uplift/">Voltar ao Uplift</a>
  </main>
</body>
</html>
