<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uplift — Motivational Quotes</title>
    <meta name="description" content="Daily motivational quotes with customizable themes and favorites.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="purple">

<!-- SUBMISSION MODAL -->
<div class="submit-modal" id="submitModal">
    <div class="submit-box">
        <h3>Suggest a quote</h3>
        <textarea class="sub-field" id="subText" placeholder="Enter the quote..." rows="3"></textarea>
        <input class="sub-field" id="subAuthor" placeholder="Author" />
        <select class="sub-field" id="subCat">
            <option value="motivacao">Motivation</option>
            <option value="sucesso">Success</option>
            <option value="amor">Love</option>
            <option value="vida">Life</option>
            <option value="sabedoria">Wisdom</option>
        </select>
        <p class="sub-error" id="subError"></p>
        <div class="sub-actions">
            <button class="btn-sub-cancel" id="btnCancelSubmit">Cancel</button>
            <button class="btn-sub-send"   id="btnSubmitQuote">Send</button>
        </div>
    </div>
</div>

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo"><i class="fas fa-bolt"></i> Uplift</div>
        <div class="nav-actions">
            <button id="btnOpenSubmit" class="btn-icon" title="Suggest a quote">
                <i class="fas fa-plus"></i>
            </button>
            <button id="favToggle" class="btn-icon" title="Favorites">
                <i class="fas fa-heart"></i><span id="favCount">0</span>
            </button>
            <div class="theme-picker">
                <button class="theme-dot" data-theme="purple" title="Purple"></button>
                <button class="theme-dot" data-theme="blue" title="Blue"></button>
                <button class="theme-dot" data-theme="green" title="Green"></button>
                <button class="theme-dot" data-theme="orange" title="Orange"></button>
                <button class="theme-dot" data-theme="pink" title="Pink"></button>
            </div>
        </div>
    </div>
</nav>

<main>
    <section class="hero">
        <div class="categories">
            <button class="cat-btn active" data-cat="all">All</button>
            <button class="cat-btn" data-cat="motivacao">Motivation</button>
            <button class="cat-btn" data-cat="sucesso">Success</button>
            <button class="cat-btn" data-cat="amor">Love</button>
            <button class="cat-btn" data-cat="vida">Life</button>
            <button class="cat-btn" data-cat="sabedoria">Wisdom</button>
        </div>

        <div class="quote-card" id="quoteCard">
            <div class="quote-mark">"</div>
            <p class="quote-text" id="quoteText"></p>
            <span class="quote-author" id="quoteAuthor"></span>
            <span class="quote-cat-badge" id="quoteCat"></span>
        </div>

        <div class="quote-actions">
            <button class="action-btn" id="favBtn" title="Favorite"><i class="fas fa-heart"></i></button>
            <button class="action-btn" id="shareBtn" title="Share"><i class="fas fa-share-alt"></i></button>
            <button class="action-btn primary" id="nextBtn"><i class="fas fa-arrow-right"></i> Next</button>
        </div>

        <p class="progress-info">
            <span id="quoteIndex">1</span> / <span id="quoteTotal">0</span>
            &nbsp;·&nbsp; ← → to navigate
        </p>
    </section>

    <section class="fav-panel" id="favPanel">
        <div class="fav-header">
            <h2><i class="fas fa-heart"></i> Favorites</h2>
            <button id="exportFavsBtn" class="btn-clear">Export</button>
            <button id="clearFavs" class="btn-clear">Clear all</button>
        </div>
        <div class="fav-list" id="favList"></div>
    </section>
</main>

<footer class="footer">
    <p>Uplift &copy; 2025 &nbsp;·&nbsp;
        <a href="https://github.com/non-s/Uplift" target="_blank">GitHub</a> &nbsp;·&nbsp;
        <a href="https://non-s.github.io/portfolio">Portfolio</a>
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
