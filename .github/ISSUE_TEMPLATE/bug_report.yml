name: Production bug
description: Report a production issue with enough evidence to reproduce and fix.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: impact
    attributes:
      label: Production impact
      description: Who is affected and what fails?
      placeholder: "Example: page does not load, Firebase write is denied, UI action breaks."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, browser/device, page URL, and account role if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, console output, failing check URLs, or smoke-test output. Do not paste secrets.
    validations:
      required: false
