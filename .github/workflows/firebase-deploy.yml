name: Firebase Deploy

on:
  push:
    branches: [main]
    paths:
      - ".firebaserc"
      - "firebase.json"
      - "firestore.indexes.json"
      - "firestore.rules"
      - ".github/workflows/firebase-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-firestore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIREBASE_PROJECT_ID: non-s-firebase-20260621

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          check-latest: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Check deploy project
        id: firebase-preflight
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");

          const firebaseRc = JSON.parse(fs.readFileSync(".firebaserc", "utf8"));
          const expectedProject = firebaseRc.projects && firebaseRc.projects.default;
          const credentialsPath = process.env.GOOGLE_APPLICATION_CREDENTIALS;

          if (!expectedProject) {
            throw new Error(".firebaserc must define projects.default");
          }
          if (!credentialsPath) {
            throw new Error("GOOGLE_APPLICATION_CREDENTIALS was not exported by the auth action");
          }

          const credentials = JSON.parse(fs.readFileSync(credentialsPath, "utf8"));
          const credentialProject = credentials.project_id;
          const output = process.env.GITHUB_OUTPUT;

          if (credentialProject !== expectedProject) {
            console.log(`::warning::SERVICE_ACCOUNT_JSON belongs to ${credentialProject || "an unknown project"}, but this app deploys to ${expectedProject}. Replace the GitHub secret with a service account from ${expectedProject} to enable Firestore deployment.`);
            fs.appendFileSync(output, "deploy=false\n");
          } else {
            fs.appendFileSync(output, "deploy=true\n");
          }
          NODE

      - name: Deploy Firestore rules and indexes
        if: steps.firebase-preflight.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          npx --yes firebase-tools@latest deploy --only firestore:rules,firestore:indexes --project "$FIREBASE_PROJECT_ID" --non-interactive
