name: Build & Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Debug APK e publica na Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restaurar google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          else
            cat > app/google-services.json << 'EOF'
            {"project_info":{"project_number":"000000000000","project_id":"uplift-app","storage_bucket":"uplift-app.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.motivacional.frases"}},"api_key":[{"current_key":"AIzaPlaceholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
            EOF
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Permissão gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug -x lint -x test

      - name: Renomear APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/Uplift.apk

      - name: Publicar APK na Release v1.0.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "Uplift v1.0.0"
          files: dist/Uplift.apk
          token: ${{ secrets.GITHUB_TOKEN }}
