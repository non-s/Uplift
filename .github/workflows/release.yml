name: Build & Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Debug APK e publica na Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Restaurar google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{{{ secrets.GOOGLE_SERVICES_JSON }}}}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
          else
            echo '{{"project_info":{{"project_number":"000000000000","project_id":"uplift-app","storage_bucket":"uplift-app.appspot.com"}},"client":[{{"client_info":{{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{{"package_name":"com.motivacional.frases"}}}},"api_key":[{{"current_key":"AIzaSyPlaceholder"}}],"services":{{"appinvite_service":{{"other_platform_oauth_client":[]}}}}}}],"configuration_version":"1"}}' > app/google-services.json
          fi

      - name: Permissao gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug -x lint -x test --stacktrace

      - name: Localizar e renomear APK
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK encontrado: $APK"
          mkdir -p dist
          cp "$APK" dist/Uplift.apk
          ls -lh dist/

      - name: Publicar na Release v1.0.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "Uplift v1.0.0"
          files: dist/Uplift.apk
          fail_on_unmatched_files: true
          token: ${{{{ secrets.GITHUB_TOKEN }}}}
